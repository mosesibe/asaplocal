# Local development stack: Postgres + Redis (Upstash-compatible) + the three
# Next.js apps. Production deploys to Vercel + Supabase instead (see
# DEPLOYMENT.md) — this compose file is for local dev / CI integration tests.
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: asaplocal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/asaplocal
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  provider:
    build:
      context: .
      dockerfile: apps/provider/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/asaplocal
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/asaplocal
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
